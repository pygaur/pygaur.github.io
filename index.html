<!DOCTYPE html>
<html>

<head>

<title>FizzBuzzArt Workshops</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{
    font-family:Arial;
    max-width:900px;
    margin:auto;
    padding:30px;
    background:#fafafa;
}


h1{
    text-align:center;
}


.card {

    background:white;
    border-radius:15px;
    overflow:hidden;
    margin:20px 0;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
    cursor:pointer;

}




.card img {

    width:100%;
    height:260px;
    object-fit:cover;
    object-position:center;
    display:block;

}




.content{

    padding:20px;

}


.title{

    font-size:24px;
    font-weight:bold;

}


.price{

    color:#3ECF8E;
    font-size:22px;
    font-weight:bold;

}


</style>


</head>


<body>


<h1>
🎨 Upcoming Workshops
</h1>


<div id="workshops"></div>



<script>


const {createClient}=supabase;


const client=createClient(

"https://vswaudchnxlttzjfgeij.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzd2F1ZGNobnhsdHR6amZnZWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODY1OTYsImV4cCI6MjEwMDI2MjU5Nn0.ghLpA97sKdqCwcBSyL5pLY1QceLIGSc4ZSAjqu6GaSg"

);



async function loadWorkshops(){


const {data,error}=await client

.from("fizzbuzzart_workshops")

.select("*")

.order("workshop_date",{ascending:true});



if(error){

console.log(error);
return;

}



const container=document.getElementById("workshops");



data.forEach(workshop=>{


let card=document.createElement("div");


card.className="card";



card.innerHTML=`

<img src="${workshop.image_url}">


<div class="content">


<div class="title">

${workshop.title}

</div>


<p>

📅 ${new Date(workshop.workshop_date)
.toDateString()}

</p>


<p>

⏰ ${workshop.start_time}
-
${workshop.end_time}

</p>


<p>

📍 ${workshop.address}

</p>


<p class="price">

₹${workshop.price}

</p>


</div>

`;



card.onclick=function(){

window.location.href=
"workshop.html?id="+workshop.id;

};



container.appendChild(card);



});


}



loadWorkshops();


</script>


</body>

</html>
