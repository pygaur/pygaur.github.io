<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzzArt Registration</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 450px;
            margin: 50px auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            background: #3ECF8E;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #2fb67d;
        }

        #result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #eafaf2;
            border: 1px solid #3ECF8E;
            border-radius: 5px;
        }

        #errorMsg {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h2>FizzBuzzArt Registration</h2>

<form id="registrationForm">
    <div class="form-group">
        <label for="fullName">Name</label>
        <input
            type="text"
            id="fullName"
            placeholder="Enter your name"
            required>
    </div>

    <button id="submitBtn" type="submit">
        Register
    </button>
</form>

<div id="result">
    <h3>🎉 Registration Successful!</h3>
    <p>Thank you, <strong id="displayName"></strong>.</p>
</div>

<div id="errorMsg"></div>

<script>
const { createClient } = supabase;

const SUPABASE_URL = "https://vswaudchnxlttzjfgeij.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzd2F1ZGNobnhsdHR6amZnZWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODY1OTYsImV4cCI6MjEwMDI2MjU5Nn0.ghLpA97sKdqCwcBSyL5pLY1QceLIGSc4ZSAjqu6GaSg";

const client = createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

document
.getElementById("registrationForm")
.addEventListener("submit", async function (e) {

    e.preventDefault();

    const button = document.getElementById("submitBtn");
    const errorDiv = document.getElementById("errorMsg");
    const resultDiv = document.getElementById("result");

    button.disabled = true;
    button.innerText = "Registering...";

    errorDiv.innerText = "";
    resultDiv.style.display = "none";

    const name = document.getElementById("fullName").value;

    const { error } = await client
        .from("fizzbuzzart_subscriptions")
        .insert([
            {
                name: name
            }
        ]);

    button.disabled = false;
    button.innerText = "Register";

    if (error) {
        console.error(error);
        errorDiv.innerText = error.message;
        return;
    }

    document.getElementById("displayName").innerText = name;
    resultDiv.style.display = "block";

    document.getElementById("registrationForm").reset();

});
</script>

</body>
</html>
