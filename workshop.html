<!DOCTYPE html>
<html>

<head>

<title>Workshop Details</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    max-width:700px;
    margin:auto;
    padding:30px;
}


img{
    width:100%;
    border-radius:15px;
}


button{

    background:#3ECF8E;
    color:white;
    border:none;
    padding:14px;
    width:100%;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}


button:hover{
    background:#2ca873;
}


/* MODAL */

.modal{

    display:none;

    position:fixed;

    z-index:1000;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.5);

}


.modal-content{

    background:white;

    width:90%;

    max-width:450px;

    margin:10% auto;

    padding:25px;

    border-radius:15px;

}


.close{

    float:right;

    font-size:25px;

    cursor:pointer;

}


input{

    width:100%;

    padding:12px;

    margin:8px 0;

    box-sizing:border-box;

}


#success{

    display:none;

    background:#eafff3;

    padding:20px;

    border-radius:10px;

}


.registration-id{

    font-size:32px;

    font-weight:bold;

    color:#3ECF8E;

}



</style>


</head>


<body>



<div id="details"></div>


<br>


<button onclick="openModal()">

Register Now

</button>




<!-- REGISTRATION MODAL -->


<div id="registrationModal" class="modal">


<div class="modal-content">


<span class="close" onclick="closeModal()">

×
</span>


<h2>
Workshop Registration
</h2>



<input 
id="name"
placeholder="Your Name"
>


<input 
id="city"
placeholder="City"
>


<input 
id="mobile"
placeholder="Mobile Number"
>



<button onclick="register()">

Submit Registration

</button>



<div id="success">


<h3>
🎉 Registration Successful
</h3>


<p>
Your Registration ID:
</p>


<div class="registration-id" id="regId"></div>


</div>



</div>

</div>






<script>


const {createClient}=supabase;


const client=createClient(

"https://vswaudchnxlttzjfgeij.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzd2F1ZGNobnhsdHR6amZnZWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODY1OTYsImV4cCI6MjEwMDI2MjU5Nn0.ghLpA97sKdqCwcBSyL5pLY1QceLIGSc4ZSAjqu6GaSg"

);



const workshopId =
new URLSearchParams(
window.location.search
).get("id");



let workshop;



async function loadWorkshop(){


const {data,error}=await client

.from("fizzbuzzart_workshops")

.select("*")

.eq("id",workshopId)

.single();



if(error){

alert(error.message);

return;

}



workshop=data;



document.getElementById("details")
.innerHTML=`

<img src="${data.image_url}">


<h1>
${data.title}
</h1>


<p>
${data.description}
</p>


<p>
📅 ${new Date(data.workshop_date)
.toDateString()}
</p>


<p>
⏰ ${data.start_time}
-
${data.end_time}
</p>


<p>
📍 ${data.address}
</p>


<p>
💰 Ticket Price: ₹${data.price}
</p>


<p>
🍱 Food Coupon: ₹${data.food_coupon_value}
</p>


<p>
🪑 Seats: ${data.max_seats}
</p>


`;

}


loadWorkshop();





function openModal(){

document.getElementById("registrationModal")
.style.display="block";

}



function closeModal(){

document.getElementById("registrationModal")
.style.display="none";

}





async function register(){


const name =
document.getElementById("name").value;


const city =
document.getElementById("city").value;


const mobile =
document.getElementById("mobile").value;



if(!name || !mobile){

alert("Please enter name and mobile");

return;

}



const {data,error}=await client

.from("fizzbuzzart_workshop_registrations")

.insert([

{

workshop_id: workshopId,

name:name,

city:city,

mobile:mobile

}

])

.select("id")

.single();



if(error){

alert(error.message);

return;

}



document.getElementById("success")
.style.display="block";


document.getElementById("regId")
.innerText=data.id;



}



window.onclick=function(event){

const modal =
document.getElementById("registrationModal");


if(event.target==modal){

closeModal();

}

}



</script>


</body>

</html>
